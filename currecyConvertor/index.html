<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Convertor</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main>
      <h1 style="text-align: center;">Currency Convertor</h1>
      <div id="amount">
        <label for="amountInput">Amount : </label>
        <input type="number" id="amountInput" value="100" />
      </div>
      <div id="container">
        <div id="fromCurrency">
          <label for="fromCurrencyInput">From Currency : </label>
          <img class="flags" src="https://flagsapi.com/US/flat/64.png">
          <select id="fromCurrencyInput">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="INR">INR</option>
          </select>
        </div>
        <div id="exchangeIcon">
          <i class="fa-solid fa-arrow-right-arrow-left"></i>
        </div>
        <div id="toCurrency">
          <label for="toCurrencyInput">To Currency : </label>
          <img class="flags" src="https://flagsapi.com/IN/flat/64.png">
          <select id="toCurrencyInput">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="INR" selected>INR</option>
          </select>
        </div>
      </div>
      <div id="result">Rs. 94</div>
      <button id="convertBtn">Get Exchange Rate</button>
      <script src="countryname.js"></script>
      <!-- <script type="module" src="countrySelect.js"></script> -->
    </main>
  </body>
</html>
