<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Toolkit</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="container">
        <hi id="title">String Toolkit</hi>
        <textarea id="textInput" placeholder="Enter the text...."></textarea>
        <div id="buttons">
            <button id="countWords">Count Words</button>
            <button id="reverseString">Reverse String</button>
            <button id="toUpperCase">To Upper Case</button>
            <button id="toLowerCase">To Lower Case</button>
            <button id="removeSpaces">Remove Spaces</button>
            <button id="capitalizeWords">Capitalize Words</button>
            <button id="clearText">Clear Text</button>
        </div>
        <div id="result">
            <h2>Result.......</h2>
            <p id="output"></p>
        </div>

    </div>
</body>
</html>
